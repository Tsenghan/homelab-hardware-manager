services:
  homelab:
    image: tsenghan/homelab-manager:latest
    container_name: homelab-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/backend/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
